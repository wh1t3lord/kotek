name: modules

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# the ci-logs/badges publishing steps push branches — the default
# GITHUB_TOKEN is read-only, so pushes 403 silently without this
permissions:
  contents: write

concurrency:
  group: modules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  module:
    name: ${{ matrix.name }}
    runs-on: windows-2022
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: defines, targets: "kotek.core.defines" }
          - { name: types-constants-enum, targets: "kotek.core.types kotek.core.constants kotek.core.enum" }
          - { name: containers, targets: "kotek.core.containers" }
          - { name: math-format-utility, targets: "kotek.core.math kotek.core.format kotek.core.utility" }
          - { name: api-main_manager, targets: "kotek.core.api kotek.core.main_manager" }
          - { name: os-window-input, targets: "kotek.core.os kotek.core.window kotek.core.window.glfw kotek.core.window_manager kotek.core.input" }
          - { name: memory, targets: "kotek.core.memory" }
          - { name: filesystem-log-console-config, targets: "kotek.core.filesystem kotek.core.log kotek.core.console kotek.core.engine_config" }
          - { name: render, targets: "kotek.render" }
          - { name: ui, targets: "kotek.ui" }
          - { name: core-game, targets: "kotek.core kotek.game kotek" }

    steps:
      - uses: actions/checkout@v4

      - name: cache vcpkg
        uses: actions/cache@v4
        with:
          # only the installed triplet tree + the tool itself: packages/ and
          # buildtrees/ are recreatable intermediates and blow the 10 GB
          # cache quota (locally >1.2 GB each); key bumps on the dep list
          path: |
            vcpkg/installed
            vcpkg/vcpkg.exe
          key: vcpkg-${{ runner.os }}-x64-windows-static-v2-${{ hashFiles('cmake/windows/vcpkg_nuget_minimal.cmake') }}

      - name: setup msvc
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: configure
        # retry: vcpkg downloads flake on runners but installs resume cleanly
        shell: pwsh
        run: |
          foreach ($attempt in 1..3) {
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq 3) { exit $LASTEXITCODE }
            Write-Host "configure attempt $attempt failed, retrying (vcpkg resumes)..."
          }

      - name: build module targets
        shell: pwsh
        run: |
          foreach ($t in "${{ matrix.targets }}".Split(' ')) {
            cmake --build build --config Debug --target $t --parallel
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      # job logs and artifacts need admin rights to view — push the failure
      # logs to a public ci-logs branch instead
      - name: publish failure logs to ci-logs branch
        if: failure()
        shell: pwsh
        run: |
          $dest = "ci-logs/${{ github.run_id }}/${{ matrix.name }}"
          New-Item -ItemType Directory -Force $dest | Out-Null
          cmake -S . -B build-diag -DCMAKE_BUILD_TYPE=Debug *> "$dest/configure-output.log"; $null
          if (Test-Path build) { Get-ChildItem -Recurse build -Include *.log -File | Copy-Item -Destination $dest -Force -ErrorAction SilentlyContinue }

          # push from a SEPARATE clone: branch switching inside the job's
          # checkout proved too fragile (shallow refspecs, orphan states)
          $tmp = "$env:RUNNER_TEMP/ci-logs-push"
          Remove-Item -Recurse -Force $tmp -ErrorAction SilentlyContinue
          $repo = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git clone --depth 1 --branch ci-logs $repo $tmp
          if ($LASTEXITCODE -ne 0) {
            git clone --depth 1 $repo $tmp
            git -C $tmp checkout --orphan ci-logs
            git -C $tmp rm -rf --quiet .
          }
          New-Item -ItemType Directory -Force "$tmp/$dest" | Out-Null
          Copy-Item -Recurse "$dest/*" "$tmp/$dest/" -Force
          git -C $tmp config user.email "ci@kotek"
          git -C $tmp config user.name "kotek-ci"
          git -C $tmp add $dest
          git -C $tmp diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Write-Host "no new logs to publish"; exit 0 }
          git -C $tmp commit --quiet -m "ci logs: modules ${{ matrix.name }} run ${{ github.run_number }}"
          git -C $tmp push origin ci-logs

      - name: emit badge
        if: always()
        shell: pwsh
        run: |
          $color = if ($LASTEXITCODE -eq 0) { "brightgreen" } else { "red" }
          $msg = if ($LASTEXITCODE -eq 0) { "passing" } else { "failing" }
          @{
            schemaVersion = 1
            label = "${{ matrix.name }}"
            message = $msg
            color = $color
          } | ConvertTo-Json -Compress | Out-File -FilePath "${{ matrix.name }}.json" -Encoding utf8

      - name: upload badge
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-${{ matrix.name }}
          path: ${{ matrix.name }}.json
          retention-days: 1

  badges:
    name: publish badges
    runs-on: windows-2022
    needs: [module]
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: collect badges
        uses: actions/download-artifact@v4
        with:
          pattern: badge-*
          path: .

      # the badges branch may not exist yet (first push) — clone it if it
      # exists, create it as an orphan otherwise, then push the badges
      - name: publish to badges branch
        shell: pwsh
        run: |
          $tmp = "$env:RUNNER_TEMP/badges-push"
          Remove-Item -Recurse -Force $tmp -ErrorAction SilentlyContinue
          $repo = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git clone --depth 1 --branch badges $repo $tmp
          if ($LASTEXITCODE -ne 0) {
            git clone --depth 1 --no-checkout $repo $tmp
            git -C $tmp checkout --orphan badges
            git -C $tmp rm -rf --quiet . 2>$null
          }
          Copy-Item *.json "$tmp/" -Force
          git -C $tmp config user.name "kotek-ci"
          git -C $tmp config user.email "ci@kotek.local"
          git -C $tmp add *.json
          git -C $tmp diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Write-Host "badges unchanged"; exit 0 }
          git -C $tmp commit -m "badges: ${{ github.sha }}"
          git -C $tmp push origin badges
