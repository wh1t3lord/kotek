name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# the ci-logs/badges publishing steps push branches — the default
# GITHUB_TOKEN is read-only, so pushes 403 silently without this
permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: windows (${{ matrix.config }}, ${{ matrix.linkage.name }})
    runs-on: windows-2022
    timeout-minutes: 180
    # full dynamic is blocked today by the cyclic module graph (K18):
    # visible-but-non-blocking leg until the cycles are broken
    continue-on-error: ${{ matrix.linkage.experimental }}
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        linkage:
          # owner requirement (2026-07-23): CI compiles the linkage
          # configurations; the third (kotek.exe + game.ktk) is covered by
          # the zircon repo's matrix (game.ktk is built there)
          - name: static
            flags: ""
            experimental: false
          - name: dynamic
            flags: "-DKOTEK_LINKAGE=SHARED"
            experimental: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: cache vcpkg
        uses: actions/cache@v4
        with:
          # only the installed triplet tree + the tool itself: packages/ and
          # buildtrees/ are recreatable intermediates and blow the 10 GB
          # cache quota (locally >1.2 GB each); key bumps on the dep list
          path: |
            vcpkg/installed
            vcpkg/vcpkg.exe
          key: vcpkg-${{ runner.os }}-x64-windows-static-v2-${{ hashFiles('cmake/windows/vcpkg_nuget_minimal.cmake') }}

      - name: setup msvc
        uses: ilammy/msvc-dev-cmd@v1.13.0

      # install deps explicitly, grouped, BEFORE configure: the configure
      # step also runs these installs (vcpkg_nuget_minimal.cmake) and is
      # idempotent then, but grouping them here makes the failing port group
      # visible in public step conclusions (job logs need admin rights)
      - name: deps base (zstd, etl, utfcpp, glm, cgltf, spdlog, tbb, pkgconf, mimalloc)
        run: |
          # the vcpkg cache restores only installed/ + vcpkg.exe (by design,
          # quota), so the checkout itself is missing on warm runs — repair
          # it in place (a fresh clone into a non-empty dir would fail)
          if (-not (Test-Path vcpkg/.git)) {
            if (-not (Test-Path vcpkg)) { mkdir vcpkg | Out-Null }
            git -C vcpkg init
            git -C vcpkg remote add origin https://github.com/microsoft/vcpkg.git
          }
          git -C vcpkg fetch --depth 1 origin 1bf999414d7def6fea4c3c310d613ceed039f929
          git -C vcpkg checkout FETCH_HEAD
          if (-not (Test-Path vcpkg/vcpkg.exe)) { vcpkg/bootstrap-vcpkg.bat }
          foreach ($p in @("zstd","etl","utfcpp","glm","cgltf","spdlog","tbb","pkgconf","mimalloc")) {
            $safe = $p -replace '[^a-zA-Z0-9]', '_'
            foreach ($attempt in 1..3) {
              vcpkg/vcpkg install "${p}:x64-windows-static" *> "deps-$safe.log"
              if ($LASTEXITCODE -eq 0) { break }
              if ($attempt -eq 3) { Get-Content "deps-$safe.log" -Tail 40; exit $LASTEXITCODE }
            }
          }
      - name: deps graphics (vulkan, bgfx, glfw3, ktx)
        run: |
          foreach ($p in @("vulkan","bgfx[multithreaded]","glfw3","ktx")) {
            $safe = $p -replace '[^a-zA-Z0-9]', '_'
            foreach ($attempt in 1..3) {
              vcpkg/vcpkg install "${p}:x64-windows-static" *> "deps-$safe.log"
              if ($LASTEXITCODE -eq 0) { break }
              if ($attempt -eq 3) { Get-Content "deps-$safe.log" -Tail 40; exit $LASTEXITCODE }
            }
          }
      - name: deps media/ui (rmlui, freetype, dav1d)
        run: |
          foreach ($p in @("rmlui[freetype]","freetype","dav1d")) {
            $safe = $p -replace '[^a-zA-Z0-9]', '_'
            foreach ($attempt in 1..3) {
              vcpkg/vcpkg install "${p}:x64-windows-static" *> "deps-$safe.log"
              if ($LASTEXITCODE -eq 0) { break }
              if ($attempt -eq 3) { Get-Content "deps-$safe.log" -Tail 40; exit $LASTEXITCODE }
            }
          }
      - name: deps tests/profilers (gtest, tracy, boost-json)
        run: |
          foreach ($p in @("gtest","tracy","boost-json")) {
            $safe = $p -replace '[^a-zA-Z0-9]', '_'
            foreach ($attempt in 1..3) {
              vcpkg/vcpkg install "${p}:x64-windows-static" *> "deps-$safe.log"
              if ($LASTEXITCODE -eq 0) { break }
              if ($attempt -eq 3) { Get-Content "deps-$safe.log" -Tail 40; exit $LASTEXITCODE }
            }
          }

      # vcpkg downloads occasionally flake on GH runners mid-install (the
      # failure is resumable — a retry continues from the failed port, as
      # proven by the ci-logs diag configure being green on every leg)
      - name: configure
        shell: pwsh
        run: |
          foreach ($attempt in 1..3) {
            cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} ${{ matrix.linkage.flags }} *> configure-output.log
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq 3) { Get-Content configure-output.log -Tail 60; exit $LASTEXITCODE }
            Write-Host "configure attempt $attempt failed, retrying (vcpkg resumes)..."
          }

      - name: build
        shell: pwsh
        run: cmake --build build --config ${{ matrix.config }} --parallel *> build-output.log; exit $LASTEXITCODE

      - name: verify outputs
        shell: pwsh
        run: |
          # standalone kotek outputs land in <build>/src/kotek.exe/<config>/,
          # the superproject layout in <build>/bin/<config>/ — accept both
          $candidates = @(
            "build/bin/${{ matrix.config }}/kotek.exe",
            "build/src/kotek.exe/${{ matrix.config }}/kotek.exe"
          )
          if (-not ($candidates | Where-Object { Test-Path $_ })) {
            throw "kotek.exe was not produced (checked: $($candidates -join ', '))"
          }

      # job logs and artifacts need admin rights to view — push the failure
      # logs to a public ci-logs branch instead so anyone (and agents) can
      # read the actual cmake/compiler error
      - name: publish failure logs to ci-logs branch
        if: failure()
        shell: pwsh
        run: |
          $dest = "ci-logs/${{ github.run_id }}/${{ matrix.config }}-${{ matrix.linkage.name }}"
          New-Item -ItemType Directory -Force $dest | Out-Null
          if (Test-Path configure-output.log) { Copy-Item configure-output.log $dest -Force }
          if (Test-Path build-output.log) { Copy-Item build-output.log $dest -Force }
          Get-ChildItem -Path . -Filter "deps-*.log" -File | Copy-Item -Destination $dest -Force -ErrorAction SilentlyContinue
          cmake -S . -B build-diag -DCMAKE_BUILD_TYPE=${{ matrix.config }} ${{ matrix.linkage.flags }} *> "$dest/diag-configure-output.log"; $null
          if (Test-Path build) { Get-ChildItem -Recurse build -Include *.log -File | Copy-Item -Destination $dest -Force -ErrorAction SilentlyContinue }

          # push from a SEPARATE clone: branch switching inside the job's
          # checkout proved too fragile (shallow refspecs, orphan states)
          $tmp = "$env:RUNNER_TEMP/ci-logs-push"
          Remove-Item -Recurse -Force $tmp -ErrorAction SilentlyContinue
          $repo = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git clone --depth 1 --branch ci-logs $repo $tmp
          if ($LASTEXITCODE -ne 0) {
            git clone --depth 1 $repo $tmp
            git -C $tmp checkout --orphan ci-logs
            git -C $tmp rm -rf --quiet .
          }
          New-Item -ItemType Directory -Force "$tmp/$dest" | Out-Null
          Copy-Item -Recurse "$dest/*" "$tmp/$dest/" -Force
          git -C $tmp config user.email "ci@kotek"
          git -C $tmp config user.name "kotek-ci"
          git -C $tmp add $dest
          git -C $tmp diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Write-Host "no new logs to publish"; exit 0 }
          git -C $tmp commit --quiet -m "ci logs: ${{ github.workflow }} ${{ matrix.config }}-${{ matrix.linkage.name }} run ${{ github.run_number }}"
          git -C $tmp push origin ci-logs

      - name: upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.config }}-${{ matrix.linkage.name }}
          path: build/**/*.log
          retention-days: 7
